<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Wowzi sign-in code</title>
</head>
<body style="margin:0;padding:0;background-color:#FAF6EF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#FAF6EF;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding-right:8px;vertical-align:middle;">
                    <!-- Wowzi snowflake SVG -->
                    <svg width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M24 4v40M4 24h40M10.34 10.34l27.32 27.32M37.66 10.34L10.34 37.66" stroke="#E8572A" stroke-width="4" stroke-linecap="round"/>
                      <circle cx="24" cy="4" r="3" fill="#E8572A"/>
                      <circle cx="24" cy="44" r="3" fill="#E8572A"/>
                      <circle cx="4" cy="24" r="3" fill="#E8572A"/>
                      <circle cx="44" cy="24" r="3" fill="#E8572A"/>
                      <circle cx="10.34" cy="10.34" r="3" fill="#E8572A"/>
                      <circle cx="37.66" cy="37.66" r="3" fill="#E8572A"/>
                      <circle cx="37.66" cy="10.34" r="3" fill="#E8572A"/>
                      <circle cx="10.34" cy="37.66" r="3" fill="#E8572A"/>
                    </svg>
                  </td>
                  <td style="vertical-align:middle;">
                    <span style="font-size:20px;font-weight:700;color:#1a1a1a;letter-spacing:-0.3px;">Wowzi</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#ffffff;border-radius:20px;padding:40px 40px 36px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">

              <table width="100%" cellpadding="0" cellspacing="0" border="0">

                <!-- Heading -->
                <tr>
                  <td style="padding-bottom:8px;">
                    <h1 style="margin:0;font-size:22px;font-weight:700;color:#1a1a1a;letter-spacing:-0.3px;">Your sign-in code</h1>
                  </td>
                </tr>

                <!-- Subtext -->
                <tr>
                  <td style="padding-bottom:32px;">
                    <p style="margin:0;font-size:15px;color:#6b7280;line-height:1.5;">
                      Enter this code to sign in to Wowzi. It expires in 10 minutes.
                    </p>
                  </td>
                </tr>

                <!-- OTP Code -->
                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <div style="display:inline-block;background-color:#FAF6EF;border-radius:14px;padding:20px 36px;">
                      <span style="font-size:40px;font-weight:700;letter-spacing:10px;color:#1a1a1a;font-variant-numeric:tabular-nums;">{{ .Token }}</span>
                    </div>
                  </td>
                </tr>

                <!-- Divider -->
                <tr>
                  <td style="padding-bottom:24px;">
                    <div style="height:1px;background-color:#f0ebe3;"></div>
                  </td>
                </tr>

                <!-- Footer note -->
                <tr>
                  <td>
                    <p style="margin:0;font-size:13px;color:#9ca3af;line-height:1.6;">
                      Didn't request this? You can safely ignore this email — someone may have entered your address by mistake.
                    </p>
                  </td>
                </tr>

              </table>
            </td>
          </tr>

          <!-- Bottom tagline -->
          <tr>
            <td align="center" style="padding-top:28px;">
              <p style="margin:0;font-size:12px;color:#b5a99a;">
                Wowzi &mdash; Where every kid finds their thing.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
